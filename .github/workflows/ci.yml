name: CI

on:
  push:
  pull_request:

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download config-file-validator
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Boeing/config-file-validator/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -L -o validator "https://github.com/Boeing/config-file-validator/releases/download/${VERSION}/validator-linux-amd64"
          chmod +x validator

      - name: Validate config files
        run: ./validator --search-path .